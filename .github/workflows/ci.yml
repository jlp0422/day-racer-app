name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode & simulators
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep iPhone | head -5

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project DayRacer.xcodeproj \
            -scheme DayRacer \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -only-testing:DayRacerTests \
            -quiet

  ui-tests:
    name: UI Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Run UI Tests
        run: |
          xcodebuild test \
            -project DayRacer.xcodeproj \
            -scheme DayRacer \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            -only-testing:DayRacerUITests \
            -quiet
